<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WKS Student Portal</title>
    
    <!-- 1. โหลด Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. โหลด React และ Babel (ตัวแปลภาษา JSX ให้เบราว์เซอร์อ่านออก) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 3. แผนที่นำทาง (Import Map) ให้มันรู้จัก React และ Lucide Icons -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "lucide-react": "https://esm.sh/lucide-react@0.292.0"
        }
      }
    </script>
</head>
<body>
    <!-- กล่องเปล่าๆ ที่เดี๋ยว React จะเอาหน้าเว็บมาเสกใส่ -->
    <div id="root"></div>

    <!-- 4. พื้นที่เขียนโค้ด React ของแก (สังเกต type="text/babel" สำคัญมาก!) -->
    <script type="text/babel" data-type="module">
        import React, { useState } from 'react';
        import { createRoot } from 'react-dom/client';
        // อิมพอร์ตไอคอนมาให้ครบตามที่แกใช้
        import { User, Lock, Eye, EyeOff, ArrowRight, Bell, Calendar, BookOpen, CheckCircle, Clock, ChevronRight, LogOut, ShieldAlert, Heart, Zap, Phone, Camera, Save, X, Award, UploadCloud, FileText, ClipboardList, AlertCircle, Check, MapPin } from 'lucide-react';

import React, { useState } from 'react';
import { User, Lock, Eye, EyeOff, ArrowRight, Bell, Calendar, BookOpen, CheckCircle, Clock, ChevronRight, LogOut, ShieldAlert, Heart, Zap, Phone, Camera, Save, X, Award, UploadCloud, FileText, ClipboardList, AlertCircle, Check, MapPin } from 'lucide-react';

// --- [ Inject Global Styles Safely ] ---
const GlobalStyle = () => (
  <style dangerouslySetInnerHTML={{
    __html: `
      @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&display=swap'); 
      ::-webkit-scrollbar { width: 0px; background: transparent; }
      body { font-family: 'Chakra Petch', sans-serif; }
    `
  }} />
);

// 🔴 URL นี้ใช้ร่วมกันทั้งระบบ
const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyQyOaHs9Ul0gwfJbwgvDOAKodUZTn05sJ0s03mOAAAmltGZXg-ZJfQz8BAVx6FlO70/exec'; 

// --- [ Component: Login ] ---
function LoginScreen({ onLoginSuccess }) {
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [showPassword, setShowPassword] = useState(false);
  const [isLoading, setIsLoading] = useState(false);
  const [errorMsg, setErrorMsg] = useState('');

  const handleLogin = async (e) => {
    e.preventDefault();
    setIsLoading(true);
    setErrorMsg('');
    
    if (GAS_WEB_APP_URL) {
      try {
        const response = await fetch(GAS_WEB_APP_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'studentLogin', username: username, password: password })
        });
        const result = await response.json();
        
        if (result.status === 'success') {
          showWelcomeMessage(result.data);
        } else {
          setErrorMsg(result.message);
          setIsLoading(false);
        }
      } catch (err) {
        setErrorMsg("ไม่สามารถเชื่อมต่อ WKS Core ได้");
        setIsLoading(false);
      }
    }
  };

  const showWelcomeMessage = (userData) => {
    const message = document.createElement('div');
    message.className = "fixed top-5 right-5 bg-cyan-500/20 border border-cyan-400 text-cyan-400 px-6 py-3 rounded-2xl backdrop-blur-md z-50 animate-bounce";
    message.innerText = `กำลังเข้าสู่ระบบนะ ${userData.NickName || userData.FirstName}!`;
    document.body.appendChild(message);
    
    setTimeout(() => {
      document.body.removeChild(message);
      onLoginSuccess(userData);
    }, 1000);
  };

  return (
    <div className="min-h-screen bg-[#050B14] flex flex-col justify-center items-center p-6 relative overflow-hidden text-slate-200">
      <div className="absolute top-[-15%] left-[-10%] w-[500px] h-[500px] bg-cyan-600/20 rounded-full blur-[120px] pointer-events-none"></div>
      <div className="absolute bottom-[-15%] right-[-10%] w-[500px] h-[500px] bg-pink-600/20 rounded-full blur-[120px] pointer-events-none"></div>

      <div className="w-full max-w-md relative z-10 animate-in fade-in zoom-in duration-500">
        <div className="text-center mb-10">
          <div className="relative inline-flex items-center justify-center w-28 h-28 mb-6 group">
            <div className="absolute inset-0 bg-gradient-to-tr from-cyan-400 to-pink-500 rounded-3xl blur-xl opacity-50 group-hover:opacity-80 transition-opacity duration-500 animate-pulse"></div>
            <img src="https://lh3.googleusercontent.com/d/1K_uNHV6Hehk7Xk4YZv9KTaRVaPIRR50E" alt="WKS Logo" className="relative w-full h-full object-cover rounded-3xl border border-white/20 shadow-2xl" />
          </div>
          <h1 className="text-4xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-400 to-pink-500 mb-2">
            ระบบสารสนเทศชั้นเรียน โรงเรียนวังตะเคียนวิทยาคม
          </h1>
          <p className="text-cyan-400/80 font-mono tracking-[0.2em] text-xs uppercase">WKS Student Portal V.1.01</p>
        </div>

        <div className="bg-white/[0.03] backdrop-blur-2xl p-8 rounded-[2rem] shadow-[0_8px_32px_0_rgba(0,0,0,0.5)] border border-white/[0.08] relative overflow-hidden">
          <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-cyan-500 to-pink-500 opacity-80"></div>
          <h2 className="text-xl font-bold text-white mb-6 flex items-center gap-3">
            <span className="relative flex h-3 w-3"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-pink-400 opacity-75"></span><span className="relative inline-flex rounded-full h-3 w-3 bg-pink-500"></span></span>
            SYSTEM LOGIN
          </h2>

          {errorMsg && (
            <div className="mb-4 p-3 bg-red-500/10 border border-red-500/50 rounded-xl text-red-400 text-sm flex items-center gap-2 animate-in slide-in-from-top-2">
              ⚠️ {errorMsg}
            </div>
          )}
          
          <form onSubmit={handleLogin} className="space-y-6">
            <div>
              <label className="block text-xs font-bold text-cyan-400 mb-2 ml-1 tracking-wider">รหัสนักเรียน (STUDENT ID)</label>
              <div className="relative group">
                <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><User className="h-5 w-5 text-slate-500 group-focus-within:text-cyan-400 transition-colors" /></div>
                <input type="text" value={username} onChange={(e) => setUsername(e.target.value)} className="block w-full pl-12 pr-4 py-4 bg-black/40 border border-white/10 rounded-2xl text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-400 transition-all" placeholder="เช่น 40101" required />
              </div>
            </div>

            <div>
              <label className="block text-xs font-bold text-pink-400 mb-2 ml-1 tracking-wider">รหัสผ่าน (PASSWORD)</label>
              <div className="relative group">
                <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><Lock className="h-5 w-5 text-slate-500 group-focus-within:text-pink-400 transition-colors" /></div>
                <input type={showPassword ? "text" : "password"} value={password} onChange={(e) => setPassword(e.target.value)} className="block w-full pl-12 pr-12 py-4 bg-black/40 border border-white/10 rounded-2xl text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-pink-500/50 focus:border-pink-400 transition-all" placeholder="รหัสผ่านของนักเรียน" required />
                <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-500 hover:text-pink-400 transition-colors">{showPassword ? <EyeOff className="h-5 w-5" /> : <Eye className="h-5 w-5" />}</button>
              </div>
            </div>

            <button type="submit" disabled={isLoading} className="w-full relative overflow-hidden group bg-slate-800 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 transform active:scale-[0.98] transition-all disabled:opacity-70 disabled:cursor-not-allowed border border-white/10 mt-4">
              <div className="absolute inset-0 bg-gradient-to-r from-cyan-500 via-blue-500 to-pink-500 opacity-90 group-hover:opacity-100 transition-opacity"></div>
              <div className="relative flex items-center gap-2 z-10">
                {isLoading ? <div className="w-6 h-6 border-3 border-white/30 border-t-white rounded-full animate-spin"></div> : <><span className="tracking-widest">CONNECT</span><ArrowRight className="w-5 h-5 group-hover:translate-x-1 transition-transform" /></>}
              </div>
            </button>
          </form>
        </div>
      </div>
    </div>
  );
}

// --- [ Component: Dashboard ] ---
function DashboardScreen({ user, onLogout }) {
  const [activeTab, setActiveTab] = useState('home');
  const [showRegModal, setShowRegModal] = useState(false);
  const [isEditingProfile, setIsEditingProfile] = useState(false);
  const [profileForm, setProfileForm] = useState(user || {});
  
  const [isSavingProfile, setIsSavingProfile] = useState(false);
  const [profileImageBase64, setProfileImageBase64] = useState("");
  
  // ข้อมูลจาก API
  const [homeworks, setHomeworks] = useState([]);
  const [announcements, setAnnouncements] = useState([]);
  const [schedules, setSchedules] = useState([]);
  
  const [isLoadingData, setIsLoadingData] = useState(false);
  const [apiError, setApiError] = useState('');

  // แปลงวันปัจจุบันเป็นภาษาไทยเพื่อใช้เป็น Default Tab ของตารางสอน
  const daysMap = ["อาทิตย์", "จันทร์", "อังคาร", "พุธ", "พฤหัสบดี", "ศุกร์", "เสาร์"];
  const currentDayTh = daysMap[new Date().getDay()];
  const [selectedDay, setSelectedDay] = useState(["จันทร์","อังคาร","พุธ","พฤหัสบดี","ศุกร์"].includes(currentDayTh) ? currentDayTh : "จันทร์");

  React.useEffect(() => {
    if (user && user.Room) {
      fetchAllData();
    }
  }, [user]);

  // ฟังก์ชันยิง API ดึง 3 อย่างรวดเดียว
  const fetchAllData = async () => {
    setIsLoadingData(true);
    setApiError('');
    try {
      // 1. ดึงการบ้าน
      const resHw = await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'getHomeworks', room: user.Room }) });
      const hwData = await resHw.json();
      if (hwData.status === 'success') setHomeworks(hwData.data);

      // 2. ดึงประกาศ
      const resAnn = await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'getAnnouncements', room: user.Room }) });
      const annData = await resAnn.json();
      if (annData.status === 'success') setAnnouncements(annData.data);

      // 3. ดึงตารางเรียน
      const resSch = await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'getSchedule', room: user.Room }) });
      const schData = await resSch.json();
      if (schData.status === 'success') setSchedules(schData.data);

    } catch (err) {
      setApiError("ไม่สามารถซิงค์ข้อมูลกับ WKS Core ได้: " + err.message);
    }
    setIsLoadingData(false);
  };

  const handleProfileChange = (e) => setProfileForm({ ...profileForm, [e.target.name]: e.target.value });

  const handleImageUpload = (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onloadend = () => setProfileImageBase64(reader.result);
      reader.readAsDataURL(file);
    }
  };

  const handleSaveProfile = async () => {
    setIsSavingProfile(true);
    try {
      const payload = {
        action: 'updateStudentProfile',
        data: {
          studentId: user.StudentID,
          nickname: profileForm.NickName || '', disease: profileForm.Disease || '', allergy: profileForm.Allergy || '',
          studentPhone: profileForm.StudentPhone || '', lineId: profileForm.LineID || '', email: profileForm.Email || '',
          parentPhone: profileForm.ParentPhone || '', talent: profileForm.Talent || '', dream: profileForm.Dream || '',
          imageBase64: profileImageBase64 || ''
        }
      };
      const response = await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
      const result = await response.json();
      
      if (result.status === 'success') {
        alert('🎉 บันทึกข้อมูลโปรไฟล์สำเร็จแล้ว!');
        setIsEditingProfile(false);
        setProfileImageBase64('');
      } else { alert('🚨 ' + result.message); }
    } catch (error) { alert('🚨 ' + error.message); }
    setIsSavingProfile(false);
  };

  // --- UI: แท็บ HUB ---
  const renderHub = () => (
    <div className="space-y-8 animate-in fade-in">
      <div className="grid grid-cols-2 gap-4">
        <div className="bg-white/[0.02] border border-cyan-500/30 rounded-2xl p-4 backdrop-blur-md shadow-[inset_0_0_20px_rgba(6,182,212,0.05)]">
          <div className="text-cyan-400 mb-1"><BookOpen className="w-5 h-5" /></div>
          <div className="text-2xl font-bold text-white">{homeworks.length}</div>
          <div className="text-xs text-slate-400 font-mono">งานค้างส่ง</div>
        </div>
        <div className="bg-white/[0.02] border border-pink-500/30 rounded-2xl p-4 backdrop-blur-md shadow-[inset_0_0_20px_rgba(236,72,153,0.05)]">
          <div className="text-pink-400 mb-1"><Calendar className="w-5 h-5" /></div>
          <div className="text-2xl font-bold text-white">{schedules.filter(s => s.day === currentDayTh).length}</div>
          <div className="text-xs text-slate-400 font-mono">คาบเรียนวันนี้</div>
        </div>
      </div>

      <section>
        <div className="flex items-center justify-between mb-4">
          <h2 className="text-lg font-bold text-white flex items-center gap-2"><Bell className="w-5 h-5 text-cyan-400" /> ประกาศสำคัญ</h2>
          <button onClick={fetchAllData} className="text-xs bg-white/5 hover:bg-white/10 p-2 rounded-full text-cyan-400 transition-colors">
            <Clock className={`w-4 h-4 ${isLoadingData ? 'animate-spin' : ''}`} />
          </button>
        </div>
        
        <div className="space-y-3">
          {isLoadingData ? (
            <div className="text-center py-6 text-slate-500 font-mono text-xs animate-pulse">กำลังซิงค์ประกาศ...</div>
          ) : announcements.length === 0 ? (
            <div className="bg-black/20 border border-white/5 rounded-2xl p-6 text-center text-slate-400 text-sm">ไม่มีประกาศในขณะนี้</div>
          ) : (
            announcements.map((ann) => (
              <div key={ann.id} className="relative group bg-white/[0.03] border border-white/10 rounded-2xl p-4 overflow-hidden">
                <div className={`absolute top-0 left-0 w-1 h-full ${ann.urgent ? 'bg-pink-500 shadow-[0_0_10px_rgba(236,72,153,0.8)]' : 'bg-cyan-500'}`}></div>
                <p className="text-sm text-slate-300 leading-relaxed pl-2">{ann.text}</p>
                <p className="text-xs text-slate-500 mt-2 pl-2 font-mono">{ann.date}</p>
              </div>
            ))
          )}
        </div>
      </section>
    </div>
  );

  // --- UI: แท็บ CLASS ---
  const renderClass = () => {
    // ฟังก์ชันแปลงคาบเป็นเวลา
    const getPeriodTime = (period) => {
      const times = ["08:30 - 09:20", "09:20 - 10:10", "10:10 - 11:00", "11:00 - 11:50", "11:50 - 12:40", "12:40 - 13:30", "13:30 - 14:20", "14:20 - 15:10", "15:10 - 16:00"];
      return times[period - 1] || "-";
    };

    const todaysSchedules = schedules.filter(s => s.day === selectedDay).sort((a,b) => a.period - b.period);

    return (
      <div className="space-y-6 animate-in slide-in-from-right-4">
        <div className="flex items-center justify-between mb-2">
          <h2 className="text-lg font-bold text-white flex items-center gap-2"><Calendar className="w-5 h-5 text-pink-400" /> ตารางเรียน</h2>
        </div>
        
        {/* ตัวเลือกวันจันทร์-ศุกร์ */}
        <div className="flex gap-2 overflow-x-auto pb-2 custom-scrollbar">
          {["จันทร์", "อังคาร", "พุธ", "พฤหัสบดี", "ศุกร์"].map(day => (
            <button 
              key={day} onClick={() => setSelectedDay(day)}
              className={`px-4 py-2 rounded-xl text-xs font-bold whitespace-nowrap transition-all ${selectedDay === day ? 'bg-pink-500 text-white shadow-[0_0_10px_rgba(236,72,153,0.5)]' : 'bg-white/5 text-slate-400 hover:bg-white/10'}`}
            >
              วัน{day}
            </button>
          ))}
        </div>

        <div className="bg-white/[0.02] border border-white/10 rounded-2xl overflow-hidden backdrop-blur-sm">
          {isLoadingData ? (
             <div className="text-center py-10 text-slate-500 font-mono text-xs animate-pulse">กำลังโหลดตาราง...</div>
          ) : todaysSchedules.length === 0 ? (
             <div className="text-center py-10 text-slate-400 text-sm">ไม่มีเรียนในวันนี้ หรือยังไม่จัดตาราง</div>
          ) : (
            todaysSchedules.map((sch, idx) => (
              <div key={idx} className="flex border-b border-white/5 last:border-0 p-4 hover:bg-white/[0.02] transition-colors items-center gap-4">
                <div className="w-12 h-12 bg-pink-500/10 rounded-xl flex flex-col items-center justify-center border border-pink-500/20 shrink-0">
                  <span className="text-[10px] text-pink-400 font-mono">คาบ</span>
                  <span className="text-lg font-bold text-white leading-none">{sch.period}</span>
                </div>
                <div className="flex-1">
                  <div className="text-[10px] text-cyan-400 font-mono mb-1">{getPeriodTime(sch.period)}</div>
                  <div className="font-bold text-slate-200 text-sm">{sch.subject}</div>
                  <div className="text-xs text-slate-500 mt-1 flex items-center gap-2">
                    <User className="w-3 h-3" /> ครู{sch.teacher}
                  </div>
                </div>
              </div>
            ))
          )}
        </div>
      </div>
    );
  };

  // --- UI: แท็บ TASKS ---
  const renderTasks = () => (
    <div className="space-y-6 animate-in slide-in-from-right-4">
      <div className="flex items-center justify-between mb-4">
        <h2 className="text-lg font-bold text-white flex items-center gap-2"><BookOpen className="w-5 h-5 text-blue-400" /> สมุดจดการบ้าน (ห้อง {user.Room})</h2>
        <button onClick={fetchAllData} className="text-xs bg-white/5 hover:bg-white/10 p-2 rounded-full text-cyan-400 transition-colors">
          <Clock className={`w-4 h-4 ${isLoadingData ? 'animate-spin' : ''}`} />
        </button>
      </div>
      
      {apiError && (
        <div className="bg-red-500/10 border border-red-500/30 rounded-xl p-4 mb-4 text-red-400 text-sm flex items-start gap-3">
          <ShieldAlert className="w-5 h-5 shrink-0" /> 
          <div><p className="font-bold">ระบบขัดข้อง!</p><p className="text-xs opacity-80">{apiError}</p></div>
        </div>
      )}

      <div className="space-y-3">
        {isLoadingData ? (
           <div className="text-center py-10 text-slate-500 font-mono text-xs animate-pulse">กำลังซิงค์ข้อมูลภารกิจ...</div>
        ) : homeworks.length === 0 ? (
           <div className="bg-black/20 border border-white/5 rounded-2xl p-8 text-center">
             <div className="w-12 h-12 bg-cyan-500/10 rounded-full flex items-center justify-center mx-auto mb-3"><CheckCircle className="w-6 h-6 text-cyan-400" /></div>
             <h3 className="text-white font-bold text-sm">ไม่มีงานค้าง!</h3>
             <p className="text-slate-500 text-xs mt-1">ห้องแกเคลียร์เควสต์หมดแล้ว สบายตัว~</p>
           </div>
        ) : (
          homeworks.map((hw, idx) => (
            <div key={hw.TaskID || idx} className="bg-black/40 border border-white/5 rounded-2xl p-4 flex gap-4 items-start group hover:border-cyan-500/30 transition-colors">
              <div className="p-2 rounded-xl bg-pink-500/10 text-pink-400 mt-1"><Clock className="w-5 h-5 group-hover:animate-bounce" /></div>
              <div className="flex-1">
                <h3 className="font-bold text-white text-sm">{hw.Subject}</h3>
                <p className="text-xs text-slate-400 mt-1 leading-relaxed">{hw.Detail}</p>
              </div>
              <div className="text-right flex flex-col items-end">
                <div className="text-[10px] uppercase tracking-wider text-cyan-400 font-mono mb-1 bg-cyan-500/10 px-2 py-0.5 rounded-full">DUE</div>
                <div className="text-xs font-bold text-pink-400">{hw.DueDate}</div>
              </div>
            </div>
          ))
        )}
      </div>
    </div>
  );

  // --- UI: แท็บ PROFILE & MODAL (ลอจิกเดิมครบ 100%) ---
  const renderProfile = () => (
    <div className="space-y-8 animate-in slide-in-from-bottom-4">
      <button onClick={() => { if (user.Doc && user.Doc !== "-") { window.open(user.Doc, '_blank'); } else { alert("ยังไม่มีเอกสารในระบบจ้า"); } }} className="w-full group relative overflow-hidden bg-gradient-to-r from-blue-600/20 to-cyan-600/20 border border-cyan-500/30 p-4 rounded-2xl flex items-center justify-between hover:border-cyan-400 transition-all">
        <div className="flex items-center gap-4">
          <div className="p-3 rounded-xl bg-cyan-500/20 text-cyan-400 group-hover:scale-110 transition-transform"><FileText className="w-6 h-6" /></div>
          <div className="text-left"><h3 className="text-sm font-bold text-white tracking-wide">เอกสารส่วนบุคคล</h3><p className="text-[10px] text-slate-400 font-mono uppercase tracking-tighter">Access your official documents</p></div>
        </div>
        <div className="w-8 h-8 rounded-full border border-white/10 flex items-center justify-center text-slate-500 group-hover:text-cyan-400 transition-colors"><ArrowRight className="w-4 h-4" /></div>
      </button>

      <button onClick={() => setShowRegModal(true)} className="w-full group relative overflow-hidden bg-gradient-to-r from-pink-600/20 to-purple-600/20 border border-pink-500/30 p-4 rounded-2xl flex items-center justify-between hover:border-pink-400 transition-all mt-3">
        <div className="flex items-center gap-4">
          <div className="p-3 rounded-xl bg-pink-500/20 text-pink-400 group-hover:scale-110 transition-transform"><ClipboardList className="w-6 h-6" /></div>
          <div className="text-left"><h3 className="text-sm font-bold text-white tracking-wide">ตรวจสอบข้อมูลทะเบียนนักเรียน</h3><p className="text-[10px] text-slate-400 font-mono uppercase tracking-tighter">Verify your academic records (A-Y)</p></div>
        </div>
        <div className="w-8 h-8 rounded-full border border-white/10 flex items-center justify-center text-slate-500 group-hover:text-pink-400 transition-colors"><ArrowRight className="w-4 h-4" /></div>
      </button>
      
      <section className="bg-white/[0.02] border border-white/10 rounded-2xl p-5 backdrop-blur-md relative">
        <div className="flex justify-between items-center border-b border-white/10 pb-3 mb-4">
          <h2 className="text-sm font-bold text-slate-400 font-mono uppercase tracking-widest flex items-center gap-2"><User className="w-4 h-4 text-cyan-400" /> VITAL STATS</h2>
          {isEditingProfile ? (
            <div className="flex gap-2">
              <button onClick={() => setIsEditingProfile(false)} className="p-1.5 bg-slate-800 text-slate-400 rounded-lg hover:text-white disabled:opacity-50" disabled={isSavingProfile}><X className="w-4 h-4" /></button>
              <button onClick={handleSaveProfile} className="p-1.5 bg-cyan-500/20 text-cyan-400 rounded-lg hover:bg-cyan-500/40 disabled:opacity-50" disabled={isSavingProfile}>{isSavingProfile ? <Clock className="w-4 h-4 animate-spin" /> : <Save className="w-4 h-4" />}</button>
            </div>
          ) : ( <button onClick={() => setIsEditingProfile(true)} className="text-xs text-pink-400 hover:text-pink-300 font-mono">EDIT PROFILE</button> )}
        </div>

        {isEditingProfile && (
           <div className="mb-6 p-4 border border-dashed border-cyan-500/30 rounded-xl text-center bg-cyan-500/5">
              <UploadCloud className="w-6 h-6 text-cyan-400 mx-auto mb-2" />
              <p className="text-xs text-slate-400 mb-2">อัปเดตรูปโปรไฟล์</p>
              {profileImageBase64 && <p className="text-[10px] text-pink-400 mb-2 animate-pulse">📷 รูปพร้อมแล้ว! กด Save มุมขวาบน</p>}
              <input type="file" accept="image/*" onChange={handleImageUpload} disabled={isSavingProfile} className="text-xs text-slate-300 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-cyan-500/20 file:text-cyan-400" />
           </div>
        )}

        <div className="grid grid-cols-1 md:grid-cols-2 gap-y-4 gap-x-4">
          {[
            { label: 'โรคประจำตัว', name: 'Disease', icon: Heart, color: 'text-pink-400', bg: 'bg-pink-500/10' },
            { label: 'ประวัติการแพ้', name: 'Allergy', icon: ShieldAlert, color: 'text-red-400', bg: 'bg-red-500/10' },
            { label: 'เบอร์นักเรียน', name: 'StudentPhone', icon: Phone, color: 'text-cyan-400', bg: 'bg-cyan-500/10' },
            { label: 'เบอร์ผู้ปกครอง', name: 'ParentPhone', icon: Phone, color: 'text-blue-400', bg: 'bg-blue-500/10' },
            { label: 'LINE ID', name: 'LineID', icon: User, color: 'text-green-400', bg: 'bg-green-500/10' },
            { label: 'Telegram ID', name: 'TelegramID', icon: User, color: 'text-sky-400', bg: 'bg-sky-500/10' },
            { label: 'E-Mail', name: 'Email', icon: ArrowRight, color: 'text-slate-400', bg: 'bg-slate-500/10' },
            { label: 'ความสามารถพิเศษ', name: 'Talent', icon: Zap, color: 'text-yellow-400', bg: 'bg-yellow-500/10' },
            { label: 'อาชีพที่ใฝ่ฝัน', name: 'Dream', icon: Award, color: 'text-purple-400', bg: 'bg-purple-500/10' }
          ].map((field) => (
            <div key={field.name} className="flex items-start gap-3">
              <div className={`p-2 rounded-lg ${field.bg} ${field.color}`}><field.icon className="w-4 h-4" /></div>
              <div className="flex-1">
                <div className="text-[10px] text-slate-500 font-mono uppercase mb-1">{field.label}</div>
                {isEditingProfile ? (
                  <input type="text" name={field.name} value={profileForm[field.name] || ''} onChange={handleProfileChange} className="w-full bg-black/40 border border-white/10 rounded-md px-2 py-1 text-sm text-white focus:outline-none focus:border-cyan-400" />
                ) : ( <div className="text-sm font-medium text-white">{user[field.name] || '-'}</div> )}
              </div>
            </div>
          ))}
        </div>
      </section>
    </div>
  );

  const renderRegistrationModal = () => (
    <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm animate-in fade-in duration-300">
      <div className="bg-[#0f172a] border border-cyan-500/30 rounded-3xl w-full max-w-md overflow-hidden shadow-[0_0_40px_rgba(6,182,212,0.15)] flex flex-col max-h-[85vh] animate-in zoom-in-95">
        <div className="p-5 border-b border-white/10 bg-gradient-to-r from-cyan-900/40 to-blue-900/40 flex justify-between items-center sticky top-0 z-10">
          <div>
            <h3 className="text-lg font-bold text-white flex items-center gap-2"><ClipboardList className="w-5 h-5 text-cyan-400" /> ข้อมูลทะเบียนนักเรียน</h3>
            <p className="text-[10px] text-cyan-400/80 font-mono tracking-widest mt-1">CONFIDENTIAL DATA (A-Y)</p>
          </div>
          <button onClick={() => setShowRegModal(false)} className="text-slate-400 hover:text-white bg-white/5 hover:bg-white/10 p-2 rounded-full"><X className="w-5 h-5" /></button>
        </div>
        <div className="p-5 overflow-y-auto space-y-4 text-sm flex-1 custom-scrollbar">
          <div className="grid grid-cols-2 gap-3">
            {[
              { label: "รหัสโรงเรียน", value: user.SchoolCode }, { label: "ชั้น/ห้อง", value: user.Room },
              { label: "เลขประจำตัวนักเรียน", value: user.StudentID }, { label: "เลขประจำตัวประชาชน", value: user.StudentIDN || user.Password },
              { label: "คำนำหน้า", value: user.Prefix }, { label: "ชื่อ", value: user.FirstName },
              { label: "นามสกุล", value: user.LastName }, { label: "เพศ", value: user.Gender },
              { label: "วันเกิด", value: user.Birthday }, { label: "สัญชาติ/เชื้อชาติ", value: `${user.Nationality || '-'} / ${user.Race || '-'}` },
              { label: "ศาสนา", value: user.Religion }, { label: "ชื่อบิดา", value: user.FatherName },
              { label: "เลข ปชช. บิดา", value: user.FatherIDN }, { label: "ชื่อมารดา", value: user.MotherName },
              { label: "เลข ปชช. มารดา", value: user.MotherIDN }, { label: "ชื่อผู้ปกครอง", value: user.Guardian },
              { label: "ระดับชั้นปัจจุบัน", value: user.MainLevel }, { label: "ภาค/ปีที่เข้า", value: `${user.Semister || '-'} / ${user.EntryYear || '-'}` },
              { label: "วันที่เข้าเรียน", value: user.EntryDate }, { label: "เข้าเรียนชั้น", value: user.EntraLevel },
              { label: "โรงเรียนเดิม", value: user.OldSchool }, { label: "จังหวัดเดิม", value: user.OldSchoolProvince },
              { label: "จบการศึกษาระดับ", value: user.Graduation }
            ].map((item, idx) => (
              <div key={idx} className={`${item.label.includes('ชื่อ') || item.label.includes('โรงเรียน') || item.label.includes('ปชช.') ? 'col-span-2' : 'col-span-1'} bg-black/20 border border-white/5 p-3 rounded-xl`}>
                <div className="text-[10px] text-slate-500 font-mono mb-1">{item.label}</div>
                <div className="font-medium text-slate-200">{item.value || '-'}</div>
              </div>
            ))}
          </div>
        </div>
        <div className="p-4 border-t border-white/10 bg-black/40 grid grid-cols-2 gap-3 sticky bottom-0">
          <button onClick={() => { alert("รับเรื่องแจ้งแก้ไขข้อมูลแล้ว!"); setShowRegModal(false); }} className="flex items-center justify-center gap-2 py-3 rounded-xl bg-pink-500/10 text-pink-400 border border-pink-500/30 hover:bg-pink-500/20 font-bold text-sm">
            <AlertCircle className="w-4 h-4" /> แจ้งแก้ไขข้อมูล
          </button>
          <button onClick={() => setShowRegModal(false)} className="flex items-center justify-center gap-2 py-3 rounded-xl bg-cyan-500 text-[#050B14] hover:bg-cyan-400 font-bold text-sm shadow-[0_0_15px_rgba(6,182,212,0.4)]">
            <Check className="w-4 h-4" /> ถูกต้อง / ปิด
          </button>
        </div>
      </div>
    </div>
  );

  return (
    <div className="min-h-screen bg-[#050B14] flex justify-center text-slate-200">
      {showRegModal && renderRegistrationModal()}
      <div className="w-full max-w-md bg-[#050B14]/80 min-h-screen shadow-2xl relative pb-24 overflow-y-auto overflow-x-hidden backdrop-blur-3xl animate-in slide-in-from-right-8 duration-500">
        <header className="px-6 pt-10 pb-6 sticky top-0 z-20 bg-[#050B14]/90 backdrop-blur-md border-b border-white/[0.05]">
          <div className="flex justify-between items-center">
            <div>
              <p className="text-cyan-400 font-mono tracking-widest text-xs mb-1 uppercase">WKS Student Portal</p>
              <h1 className="text-2xl font-bold text-white flex items-center gap-2">สวัสดี, {user?.NickName || user?.FirstName || 'นักเรียน'} 👋</h1>
              <p className="text-slate-500 text-xs mt-1">ห้อง {user?.Room || '4/1'} | เลขที่ {user?.No || '1'}</p>
            </div>
            <div onClick={onLogout} title="คลิกเพื่อ Logout" className="w-14 h-14 rounded-2xl bg-gradient-to-tr from-cyan-500 to-pink-500 p-[2px] cursor-pointer hover:scale-105 transition-transform shadow-[0_0_15px_rgba(6,182,212,0.3)] group relative">
              <div className="w-full h-full bg-[#050B14] rounded-[14px] flex items-center justify-center relative overflow-hidden">
                {user?.ProfileImage ? <img src={user.ProfileImage} alt="Profile" className="w-full h-full object-cover group-hover:opacity-10 transition-opacity rounded-[12px]" /> : <User className="w-6 h-6 text-cyan-400 group-hover:opacity-0 transition-opacity" />}
                <LogOut className="w-6 h-6 text-pink-400 absolute opacity-0 group-hover:opacity-100 transition-opacity" />
              </div>
            </div>
          </div>
        </header>

        <main className="p-6 relative z-10 space-y-8">
          {activeTab === 'home' && renderHub()}
          {activeTab === 'schedule' && renderClass()}
          {activeTab === 'tasks' && renderTasks()}
          {activeTab === 'profile' && renderProfile()}
        </main>

        <nav className="fixed bottom-0 w-full max-w-md bg-[#050B14]/90 backdrop-blur-xl border-t border-white/10 px-6 py-4 flex justify-between items-center z-50">
          {[
            { id: 'home', icon: Bell, label: 'HUB' },
            { id: 'schedule', icon: Calendar, label: 'CLASS' },
            { id: 'tasks', icon: BookOpen, label: 'TASKS' },
            { id: 'profile', icon: User, label: 'PROFILE' }
          ].map((item) => {
            const Icon = item.icon;
            const isActive = activeTab === item.id;
            return (
              <button key={item.id} onClick={() => setActiveTab(item.id)} className={`flex flex-col items-center gap-1 relative ${isActive ? 'text-cyan-400' : 'text-slate-500 hover:text-slate-300'}`}>
                {isActive && <div className="absolute -top-4 w-8 h-1 bg-cyan-400 rounded-b-full shadow-[0_0_10px_rgba(6,182,212,0.8)]"></div>}
                <Icon className={`w-6 h-6 ${isActive ? 'animate-pulse' : ''}`} />
                <span className="text-[9px] font-mono tracking-widest">{item.label}</span>
              </button>
            )
          })}
        </nav>
      </div>
    </div>
  );
}

// --- [ Component: Root App ] ---
export default function App() {
  const [isLoggedIn, setIsLoggedIn] = useState(false);
  const [userData, setUserData] = useState(null); 

  return (
    <>
      <GlobalStyle />
      {!isLoggedIn ? (
        <LoginScreen onLoginSuccess={(user) => { setUserData(user); setIsLoggedIn(true); }} />
      ) : (
        <DashboardScreen user={userData} onLogout={() => { setUserData(null); setIsLoggedIn(false); }} />
      )}
    </>
  );
}
// 5. บรรทัดสุดท้าย: สั่งให้ React เอาคอมโพเนนต์ App ไปแสดงบนหน้าจอ
        const rootElement = document.getElementById('root');
        const root = createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
